<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>翱三通史 - 用户信息设置</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(145deg, #f3ede8 0%, #e2d6ce 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            margin: 0;
        }

        /* 卡片容器 — 毛玻璃质感 */
        #user-form {
            max-width: 640px;
            width: 100%;
            background: rgba(250, 243, 237, 0.72);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-radius: 48px;
            padding: 2.8rem 2.8rem 2.8rem 2.8rem;
            box-shadow: 0 25px 50px -10px rgba(0, 0, 0, 0.12), 0 0 0 1px rgba(255, 245, 235, 0.5) inset;
            border: 1px solid rgba(255, 245, 235, 0.5);
            transition: all 0.2s ease;
        }

        /* 用户名头部 — 纯字符模拟图标 */
        #username {
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #3a2c24;
            padding-bottom: 0.4rem;
            border-bottom: 2px solid rgba(190, 168, 154, 0.25);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        /* 使用 Unicode 人物符号 + 装饰 */
        #username::before {
            content: "👤";
            font-size: 1.9rem;
            margin-right: 0.2rem;
            opacity: 0.8;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.05));
        }

        #username::after {
            content: "· 设定";
            font-size: 1.1rem;
            font-weight: 400;
            color: #8a7565;
            margin-left: 0.2rem;
            letter-spacing: 0.04em;
            opacity: 0.8;
        }

        /* 密码区域 */
        .password-area {
            background: rgba(235, 222, 213, 0.25);
            border-radius: 32px;
            padding: 1.8rem 2rem 2rem 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(205, 185, 172, 0.25);
            backdrop-filter: blur(4px);
            transition: box-shadow 0.2s;
        }

        .password-area:hover {
            box-shadow: 0 8px 20px -8px rgba(120, 80, 60, 0.08);
        }

        .password-area .area-title {
            font-weight: 600;
            font-size: 1.1rem;
            color: #4f3d31;
            letter-spacing: 0.02em;
            margin-bottom: 1.4rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* 纯文本模拟钥匙图标 */
        .password-area .area-title::before {
            content: "🔑";
            font-size: 1.2rem;
            margin-right: 0.2rem;
        }

        .password-area label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: #5e4a3b;
            margin-top: 1rem;
            margin-bottom: 0.3rem;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            opacity: 0.7;
        }

        .password-area input[type="password"] {
            width: 100%;
            padding: 0.9rem 1.2rem;
            background: rgba(250, 242, 236, 0.6);
            border: 1px solid rgba(190, 165, 150, 0.25);
            border-radius: 60px;
            font-size: 1rem;
            font-family: inherit;
            color: #2d211a;
            transition: all 0.2s;
            outline: none;
            backdrop-filter: blur(4px);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .password-area input[type="password"]:focus {
            border-color: #b58d79;
            background: rgba(255, 248, 242, 0.7);
            box-shadow: 0 0 0 4px rgba(180, 140, 120, 0.12), inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .password-area input[type="password"]::placeholder {
            color: #b5a092;
            font-weight: 300;
            opacity: 0.5;
        }

        /* 复选框组 — 精致 toggle 风格 (无外部图标) */
        .checkbox-group {
            margin-top: 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: rgba(240, 228, 218, 0.2);
            padding: 0.7rem 1.2rem 0.7rem 1.2rem;
            border-radius: 60px;
            border: 1px solid rgba(210, 188, 174, 0.15);
            transition: background 0.15s;
            cursor: default;
        }

        .checkbox-item:hover {
            background: rgba(235, 218, 206, 0.25);
        }

        /* 自定义复选框 — 完全纯 css，无外部字体 */
        .checkbox-item input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 1.6rem;
            height: 1.6rem;
            background: rgba(220, 204, 192, 0.4);
            border-radius: 40px;
            border: 1.5px solid #cbb5a6;
            transition: all 0.2s;
            position: relative;
            cursor: pointer;
            flex-shrink: 0;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
        }

        .checkbox-item input[type="checkbox"]:checked {
            background: #b58d79;
            border-color: #a47b67;
            box-shadow: 0 0 0 3px rgba(181, 141, 121, 0.2);
        }

        /* 纯 CSS 绘制对勾 (无字体图标) */
        .checkbox-item input[type="checkbox"]:checked::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -60%) rotate(45deg);
            width: 0.4rem;
            height: 0.8rem;
            border: solid white;
            border-width: 0 2.5px 2.5px 0;
            border-radius: 1px;
            opacity: 1;
        }

        .checkbox-item label {
            display: flex;
            flex-direction: column;
            font-weight: 500;
            color: #3f3229;
            cursor: pointer;
            line-height: 1.3;
            flex: 1;
        }

        .checkbox-item label small {
            font-weight: 400;
            font-size: 0.72rem;
            color: #8a7565;
            opacity: 0.75;
            margin-top: 0.1rem;
            letter-spacing: 0.01em;
        }

        /* 提交按钮 */
        button[type="submit"] {
            width: 100%;
            margin-top: 2.2rem;
            background: #3f2c21;
            border: none;
            padding: 1rem 1.5rem;
            border-radius: 80px;
            font-size: 1.1rem;
            font-weight: 500;
            color: #fcf3ec;
            letter-spacing: 0.03em;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 6px 16px rgba(60, 40, 30, 0.15);
            border: 1px solid rgba(255, 235, 220, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
        }

        /* 纯文本模拟提交图标 */
        button[type="submit"]::before {
            content: "✓";
            font-size: 1.3rem;
            font-weight: 300;
            opacity: 0.9;
        }

        button[type="submit"]:hover {
            background: #2f1f16;
            transform: scale(1.01);
            box-shadow: 0 10px 24px rgba(50, 30, 20, 0.2);
            border-color: rgba(220, 190, 170, 0.2);
        }

        button[type="submit"]:active {
            transform: scale(0.98);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* 消息框 */
        #message {
            margin-top: 1.5rem;
            padding: 0.8rem 1.2rem;
            border-radius: 60px;
            font-size: 0.95rem;
            font-weight: 500;
            text-align: center;
            transition: all 0.15s;
            min-height: 3.2rem;
            background: rgba(240, 228, 218, 0.15);
            border: 1px solid transparent;
            color: #3f3229;
        }

        #message.success {
            background: rgba(180, 210, 180, 0.2);
            border-color: rgba(130, 170, 130, 0.25);
            color: #2d5a2d;
        }

        #message.error {
            background: rgba(220, 170, 160, 0.15);
            border-color: rgba(200, 130, 120, 0.2);
            color: #7a3d35;
        }

        /* 小屏适配 */
        @media (max-width: 480px) {
            #user-form {
                padding: 1.8rem 1.2rem;
                border-radius: 32px;
            }
            #username {
                font-size: 1.7rem;
                flex-wrap: wrap;
            }
            #username::after {
                font-size: 0.9rem;
            }
            .password-area {
                padding: 1.2rem 1rem;
            }
            .checkbox-item {
                padding: 0.6rem 1rem;
                border-radius: 40px;
            }
        }
    </style>
    <script>
        async function verifyPassword(original) {
            const username = sessionStorage.getItem("user");
            const res = await fetch("/api/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({user: username, pwd: original})
            });
            const data = await res.json();
            console.log(data);
            return data.status === "success";
        }

        function showMessage(msg, type="success") {
            const msgBox = document.querySelector("#message");
            msgBox.innerHTML = msg;
            msg.className = type;
        }
    </script>
</head>
<body>

<form id="user-form">
    <div id="username"></div>
    <div class="password-area">
        <div class="area-title">修改密码</div>
        <label for="original">输入原密码</label>
        <input type="password" id="original" placeholder="••••••••">
        <label for="new">新密码</label>
        <input type="password" id="new" placeholder="新密码">
    </div>

    <div class="checkbox-group">
        <div class="checkbox-item">
            <input type="checkbox" id="show-verify">
            <label for="show-verify">
                开启防泄漏验证
                <small>开启后，阅读文章时将会需要先经过验证</small>
            </label>
        </div>
        <div class="checkbox-item">
            <input type="checkbox" id="show-sayings">
            <label for="show-sayings">
                展示教师语录
                <small>开启后，将会在教师文章下看到语录</small>
            </label>
        </div>
    </div>

    <button type="submit">提交更改</button>
    <div id="message"></div>
</form>

<script>
    const userForm = document.querySelector('#user-form');
    const originalPassword = document.querySelector('#original');
    const newPassword = document.querySelector('#new');
    const showVerifyEl = document.querySelector("#show-verify");
    const showSayingsEl = document.querySelector("#show-sayings");
    const userName = sessionStorage.getItem("user");
    const userId = sessionStorage.getItem('userID');

    async function init() {
        if (!userName) window.location.href = "/login";
        document.querySelector("#username").innerHTML = userName;
        const res = await fetch("/api/settings", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ userID: userId })
        });
        const data = await res.json();
        const settings = data.settings;
        console.log(settings);
        showVerifyEl.checked = settings.showVerify;
        showSayingsEl.checked = settings.showSayings;
    }

    userForm.addEventListener('submit',async (e) => {
        e.preventDefault();

        const pwd = newPassword.value || "default";
        if (pwd !== "default" && originalPassword.value) {
            const pass = await verifyPassword(originalPassword.value);
            if (!pass) {
                showMessage("原密码错误！", "error");
                return;
            }
        }

        const settings = {showVerify: showVerifyEl.checked, showSayings: showSayingsEl.checked};
        fetch("/api/saveUser", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({user_id: userId, pwd: pwd, settings: settings})
        })
        .then((res) => {return res.json();})
        .then((data) => {
            console.log(data);
            if (data.status === "success") {
                showMessage("修改成功！");
            } else {
                showMessage("修改失败，" + data.msg, "error");
            }
        })
        .catch((err) => {
            console.error(err);
            showMessage("发生错误：" + err, "error");
        })
    });

    document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
