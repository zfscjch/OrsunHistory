<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>翱三通史 - 用户信息设置</title>
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f6f4f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            margin: 0;
            line-height: 1.5;
            color: #1f1b17;
        }

        /* ===== 卡片容器 ===== */
        #user-form {
            max-width: 640px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            border: 1px solid #edeae5;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.02), 0 2px 6px rgba(0, 0, 0, 0.01);
            padding: 2.8rem 2.5rem 2.2rem;
            transition: box-shadow 0.2s ease;
        }
        #user-form:hover {
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.02), 0 4px 12px rgba(0, 0, 0, 0.01);
            border-color: #e3dbd2;
        }

        /* ===== 用户名头部 ===== */
        #username {
            font-size: 2rem;
            font-weight: 600;
            color: #2b241e;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #e6e0d8;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        #username::before {
            content: "👤";
            font-size: 1.8rem;
            opacity: 0.7;
        }
        #username::after {
            content: "· 设定";
            font-size: 1rem;
            font-weight: 400;
            color: #a39484;
            margin-left: 0.2rem;
        }

        /* ===== 密码区域 ===== */
        .password-area {
            background: #faf9f7;
            border-radius: 18px;
            padding: 1.8rem 2rem 2rem;
            margin-bottom: 2rem;
            border: 1px solid #edeae5;
            transition: border-color 0.2s;
        }
        .password-area:hover {
            border-color: #e3dbd2;
        }

        .password-area .area-title {
            font-weight: 600;
            font-size: 1.1rem;
            color: #2b241e;
            margin-bottom: 1.4rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .password-area .area-title::before {
            content: "🔑";
            font-size: 1.2rem;
        }

        .password-area label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: #a39484;
            margin-top: 1rem;
            margin-bottom: 0.3rem;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        .password-area input[type="password"] {
            width: 100%;
            padding: 0.8rem 1.2rem;
            background: #ffffff;
            border: 1px solid #e0d9cf;
            border-radius: 40px;
            font-size: 1rem;
            font-family: inherit;
            color: #1f1b17;
            transition: border 0.2s, box-shadow 0.2s;
            outline: none;
        }
        .password-area input[type="password"]:focus {
            border-color: #2b241e;
            box-shadow: 0 0 0 3px rgba(43, 36, 30, 0.08);
        }
        .password-area input[type="password"]::placeholder {
            color: #c6b9ab;
        }

        /* ===== 复选框组 ===== */
        .checkbox-group {
            margin-top: 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: #faf9f7;
            padding: 0.7rem 1.2rem;
            border-radius: 60px;
            border: 1px solid #edeae5;
            transition: background 0.15s, border-color 0.15s;
        }
        .checkbox-item:hover {
            background: #ffffff;
            border-color: #d6cbc0;
        }

        .checkbox-item input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 1.6rem;
            height: 1.6rem;
            background: #ffffff;
            border-radius: 50%;
            border: 1.5px solid #d6cbc0;
            transition: all 0.2s;
            flex-shrink: 0;
            cursor: pointer;
        }
        .checkbox-item input[type="checkbox"]:checked {
            background: #2b241e;
            border-color: #2b241e;
        }
        .checkbox-item input[type="checkbox"]:checked::after {
            content: "✓";
            display: block;
            text-align: center;
            line-height: 1.6rem;
            color: white;
            font-size: 1rem;
        }

        .checkbox-item label {
            display: flex;
            flex-direction: column;
            font-weight: 500;
            color: #2b241e;
            cursor: pointer;
            line-height: 1.3;
            flex: 1;
        }
        .checkbox-item label small {
            font-weight: 400;
            font-size: 0.72rem;
            color: #a39484;
            margin-top: 0.1rem;
        }

        /* ===== 提交按钮 ===== */
        button[type="submit"] {
            width: 100%;
            margin-top: 2rem;
            background: #2b241e;
            border: none;
            padding: 0.9rem 1.5rem;
            border-radius: 60px;
            font-size: 1.05rem;
            font-weight: 500;
            color: #ffffff;
            letter-spacing: 0.03em;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
        }
        button[type="submit"]::before {
            content: "✓";
            font-size: 1.2rem;
            font-weight: 300;
        }
        button[type="submit"]:hover {
            background: #1f1b17;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
        }
        button[type="submit"]:active {
            transform: translateY(0);
            box-shadow: none;
        }

        /* ===== 消息框 ===== */
        #message {
            margin-top: 1.5rem;
            padding: 0.8rem 1.2rem;
            border-radius: 60px;
            font-size: 0.95rem;
            font-weight: 500;
            text-align: center;
            transition: all 0.15s;
            min-height: 3.2rem;
            background: #faf9f7;
            border: 1px solid #edeae5;
            color: #1f1b17;
        }
        #message.success {
            border-color: #2b241e;
            background: #f0ece6;
            color: #2b241e;
        }
        #message.error {
            border-color: #b91c1c;
            background: #fde8e8;
            color: #991b1b;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 600px) {
            body {
                padding: 1rem;
            }
            #user-form {
                padding: 1.8rem 1.2rem 1.5rem;
                border-radius: 24px;
            }
            #username {
                font-size: 1.6rem;
                flex-wrap: wrap;
            }
            #username::after {
                font-size: 0.9rem;
            }
            .password-area {
                padding: 1.2rem 1rem;
            }
            .checkbox-item {
                padding: 0.6rem 1rem;
                border-radius: 40px;
            }
            button[type="submit"] {
                font-size: 1rem;
                padding: 0.8rem 1rem;
            }
        }
    </style>
    <script>
        async function verifyPassword(original) {
            const username = sessionStorage.getItem("user");
            const res = await fetch("/api/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({user: username, pwd: original})
            });
            const data = await res.json();
            console.log(data);
            return data.status === "success";
        }

        function showMessage(msg, type="success") {
            const msgBox = document.querySelector("#message");
            msgBox.innerHTML = msg;
            msg.className = type;
        }
    </script>
</head>
<body>

<form id="user-form">
    <div id="username"></div>
    <div class="password-area">
        <div class="area-title">修改密码</div>
        <label for="original">输入原密码</label>
        <input type="password" id="original" placeholder="••••••••">
        <label for="new">新密码</label>
        <input type="password" id="new" placeholder="新密码">
    </div>

    <div class="checkbox-group">
        <div class="checkbox-item">
            <input type="checkbox" id="show-verify">
            <label for="show-verify">
                开启防泄漏验证
                <small>开启后，阅读文章时将会需要先经过验证</small>
            </label>
        </div>
        <div class="checkbox-item">
            <input type="checkbox" id="show-sayings">
            <label for="show-sayings">
                展示教师语录
                <small>开启后，将会在教师文章下看到语录</small>
            </label>
        </div>
    </div>

    <button type="submit">提交更改</button>
    <div id="message"></div>
</form>

<script>
    const userForm = document.querySelector('#user-form');
    const originalPassword = document.querySelector('#original');
    const newPassword = document.querySelector('#new');
    const showVerifyEl = document.querySelector("#show-verify");
    const showSayingsEl = document.querySelector("#show-sayings");
    const userName = sessionStorage.getItem("user");
    const userId = sessionStorage.getItem('userID');

    async function init() {
        if (!userName) window.location.href = "/login";
        if (userName === "test") {
            originalPassword.disabled = true;
            newPassword.disabled = true;
            showVerifyEl.disabled = true;
            showSayingsEl.disabled = true;
            showMessage("临时账户禁止更改个性化设置！")
        }
        document.querySelector("#username").innerHTML = userName;
        const res = await fetch("/api/settings", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ userID: userId })
        });
        const data = await res.json();
        const settings = data.settings;
        console.log(settings);
        showVerifyEl.checked = settings.showVerify;
        showSayingsEl.checked = settings.showSayings;
    }

    userForm.addEventListener('submit',async (e) => {
        e.preventDefault();

        const pwd = newPassword.value || "default";
        if (pwd !== "default" && originalPassword.value) {
            const pass = await verifyPassword(originalPassword.value);
            if (!pass) {
                showMessage("原密码错误！", "error");
                return;
            }
        }

        const settings = {showVerify: showVerifyEl.checked, showSayings: showSayingsEl.checked};
        fetch("/api/saveUser", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({user_id: userId, pwd: pwd, settings: settings})
        })
        .then((res) => {return res.json();})
        .then((data) => {
            console.log(data);
            if (data.status === "success") {
                showMessage("修改成功！");
            } else {
                showMessage("修改失败，" + data.msg, "error");
            }
        })
        .catch((err) => {
            console.error(err);
            showMessage("发生错误：" + err, "error");
        })
    });

    document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
