<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>服务器维护 · 管理员控制台</title>
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f6f4f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
            margin: 0;
            line-height: 1.5;
            color: #1f1b17;
        }

        /* ===== 主容器 ===== */
        #container {
            max-width: 500px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            border: 1px solid #edeae5;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.02), 0 2px 6px rgba(0, 0, 0, 0.01);
            padding: 2.8rem 2.5rem 2.2rem;
            transition: box-shadow 0.2s ease;
        }
        #container:hover {
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.02), 0 4px 12px rgba(0, 0, 0, 0.01);
            border-color: #e3dbd2;
        }

        /* ===== 头部 ===== */
        .header {
            text-align: center;
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e6e0d8;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 600;
            color: #2b241e;
            letter-spacing: 1px;
        }
        .header .subtitle {
            color: #a39484;
            font-size: 14px;
            margin-top: 4px;
            letter-spacing: 2px;
            font-weight: 300;
        }

        /* ===== 控制卡片 ===== */
        .control-card {
            background: #faf9f7;
            border-radius: 18px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid #edeae5;
        }
        .control-card:hover {
            background: #ffffff;
            border-color: #e3dbd2;
        }

        .switch-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }
        .switch-info {
            flex: 1;
        }
        .switch-label {
            font-size: 18px;
            font-weight: 600;
            color: #2b241e;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }
        .switch-label .hint {
            font-size: 14px;
            font-weight: 400;
            color: #a39484;
        }
        .switch-description {
            font-size: 14px;
            color: #a39484;
            line-height: 1.5;
        }

        /* ===== iOS 风格开关 ===== */
        .ios-switch {
            display: none;
        }
        .ios-switch-label {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .ios-switch-label .track {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #e0e0e0;
            border-radius: 34px;
            transition: .4s;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
        }
        .ios-switch-label .thumb {
            position: absolute;
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: .4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .ios-switch:checked + .ios-switch-label .track {
            background: #2b241e;
        }
        .ios-switch:checked + .ios-switch-label .thumb {
            transform: translateX(26px);
        }
        .ios-switch:disabled + .ios-switch-label {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ===== 消息 ===== */
        .status-message {
            margin-top: 16px;
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 4px solid #a39484;
            background: #faf9f7;
            color: #1f1b17;
        }
        .status-message.error {
            border-left-color: #b91c1c;
            background: #fde8e8;
            color: #991b1b;
        }
        .status-message.success {
            border-left-color: #2b241e;
            background: #f0ece6;
            color: #2b241e;
        }

        /* ===== 加载 ===== */
        #loading {
            display: none;
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #edeae5;
            border-radius: 50%;
            border-top-color: #2b241e;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== 底部文字 ===== */
        .text-small {
            font-size: 13px;
            color: #c6b9ab;
            text-align: center;
            margin-top: 20px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 600px) {
            body {
                padding: 16px;
            }
            #container {
                padding: 24px 20px;
            }
            .switch-row {
                flex-direction: column;
                align-items: flex-start;
            }
            .ios-switch-label {
                align-self: flex-start;
            }
        }
    </style>
</head>
<body>
<div id="container" style="display: none;">
    <div class="header">
        <h1>⚙️ 服务器维护</h1>
        <div class="subtitle">管理员控制面板</div>
    </div>

    <div class="control-card">
        <div class="switch-row">
            <div class="switch-info">
                <div class="switch-label">
                    <span>维护模式</span>
                    <span class="hint" id="status-badge">● 关闭</span>
                </div>
                <div class="switch-description">
                    开启后，普通用户将无法访问网站，并看到维护提示页面
                </div>
            </div>
            <input type="checkbox" id="maintenance" class="ios-switch">
            <label for="maintenance" class="ios-switch-label">
                <span class="track"></span>
                <span class="thumb"></span>
            </label>
        </div>

        <!-- 消息显示区域 -->
        <div id="msg" class="status-message" style="display: none;"></div>

        <!-- 加载状态 -->
        <div id="loading" class="status-message" style="display: none;">
            <span class="loading"></span>
            <span>处理中，请稍候...</span>
        </div>
    </div>

    <div class="text-small">
        ⚠️ 谨慎操作 · 变更将立即生效
    </div>
</div>

<script>
    (function() {
        // 状态管理
        let isMaintenance = false;

        const container = document.querySelector("#container");
        const maintenanceBtn = document.querySelector("#maintenance");
        const msgDiv = document.querySelector("#msg");
        const loadingDiv = document.querySelector("#loading");
        const statusBadge = document.querySelector("#status-badge");

        // 工具函数：显示消息
        function showMessage(text, type = 'info') {
            msgDiv.textContent = text;
            msgDiv.className = `status-message ${type}`;
            msgDiv.style.display = 'flex';

            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 5000);
        }

        // 工具函数：显示/隐藏加载状态
        function setLoading(loading) {
            loadingDiv.style.display = loading ? 'flex' : 'none';
            maintenanceBtn.disabled = loading;
        }

        // 更新状态显示
        function updateStatusDisplay() {
            statusBadge.textContent = isMaintenance ? '● 开启' : '● 关闭';
            statusBadge.style.color = isMaintenance ? '#22c55e' : '#94a3b8';
        }

        // 检查服务器状态
        async function checkServerStatus() {
            try {
                const res = await fetch("/", {
                    method: "GET",
                    headers: {
                        "Content-Type": "application/json",
                        "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
                    }
                });
                isMaintenance = (res.status === 503);
                maintenanceBtn.checked = isMaintenance;
                updateStatusDisplay();
            } catch (err) {
                console.error("检查服务器状态失败:", err);
                showMessage('无法连接到服务器', 'error');
            }
        }

        // 监听开关变化
        maintenanceBtn.addEventListener("change", async () => {
            const newState = maintenanceBtn.checked;
            const oldState = isMaintenance;

            try {
                setLoading(true);

                const res = await fetch("/api/admin/maintenance", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        "m": newState
                    })
                });

                const data = await res.json();

                if (data.status === "success") {
                    isMaintenance = newState;
                    updateStatusDisplay();
                    showMessage(
                        newState ? '维护模式已开启' : '维护模式已关闭',
                        'success'
                    );
                } else {
                    // 恢复开关状态
                    maintenanceBtn.checked = oldState;
                    showMessage(data.message || '操作失败', 'error');
                }
            } catch (err) {
                console.error("更新状态失败:", err);
                maintenanceBtn.checked = oldState;
                showMessage('网络错误，请重试', 'error');
            } finally {
                setLoading(false);
            }
        });

        function init() {
            container.style.display = 'block';
            checkServerStatus();
            updateStatusDisplay();
        }

        document.addEventListener("DOMContentLoaded", init);
    })();
</script>
</body>
</html>
