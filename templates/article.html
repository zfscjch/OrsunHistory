<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ article.title|default('文章') }} - 翱三通史</title>
    <link rel="stylesheet" href="./../static/css/article.css">
    <script>
        // ========= 评论功能 =========
        let currentReply = {
            parentId: null,
            userName: null
        };

        const Teachers = {
            49: "黄鼎泰",
            50: "陈莲芳",
            51: "何亚琴",
            52: "黄伏云",
            53: "姜慧敏",
            54: "钱忠明",
            55: "高波",
            56: "宁志梅",
            57: "聂林",
            58: "黄海山",
            59: "张迟",
            60: "秦仁喜"
        }

        // 获取评论列表
        function getComments(targetId, isStu) {
            const requestBody = isStu
                ? { student_id: targetId }
                : { article_id: targetId };

            fetch("/api/comments/get", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(requestBody)
            })
                .then(res => res.json())
                .then(data => {
                    const commentsShow = document.getElementById("comments-show");
                    if (data && data.status === "success") {
                        const comments = data.data;
                        if (!comments || !comments.length) {
                            commentsShow.innerHTML = "<div class='no-comments'>✨ 暂无评论，来做第一个留言的人吧 ✨</div>";
                            return;
                        }
                        commentsShow.innerHTML = '';
                        console.log(comments);
                        // 按时间正序显示
                        comments.sort((a, b) => new Date(a[8]) - new Date(b[8]));
                        for (let comment of comments) {
                            new Comment(comments, ...comment);
                        }
                    } else {
                        commentsShow.innerHTML = "<div class='no-comments'>加载评论失败</div>";
                    }
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById("comments-show").innerHTML = "<div class='no-comments'>加载评论失败</div>";
                });
        }

        // 评论类
        class Comment {
            constructor(all, id, articleId, studentId, userId, parentId, content, likes, status, createdAt, updateAt, anonymous) {
                this.id = id;
                this.userId = userId;
                this.parentId = parentId;
                this.content = content;
                this.likes = likes || 0;
                this.status = status;
                this.createdAt = createdAt;
                this.anonymous = anonymous;
                this.all = all;
                this.generateHTML();
            }

            generateHTML() {
                let level = 0;
                let currentParentId = this.parentId;
                let parentComment = null;
                let parentUser = "未知";
                let parentAnonymous = false;

                if (this.parentId) {
                    for (let c of this.all) {
                        if (c[0] === this.parentId) {
                            parentComment = c;
                            break;
                        }
                    }
                }
                if (parentComment) {
                    parentUser = parentComment[3];
                    parentAnonymous = parentComment[10];
                }

                let username = this.anonymous ? "匿名用户" : `翱三班${this.userId}号同学`;
                if (this.userId >= 49 && this.userId <= 60 && !this.anonymous) {
                    username = "<spanv class='admin'>教师</spanv>" + Teachers[this.userId] + "老师";
                }

                if (this.userId >= 61 && this.userId <= 67) {
                    username = `<strong><span class="admin">管理员</span>翱三通史·管理员${this.userId - 61}号</strong>`;
                }
                let parentName = parentAnonymous ? '匿名用户' : `翱三班${parentUser}号`;
                if (parentUser >= 61 && parentUser <= 67) {
                    username = `<strong><span class="admin">管理员</span>翱三通史·管理员${parentUser - 61}号</strong>`;
                }

                const commentsShow = document.querySelector("#comments-show");
                const commentHtml = `<div class="comment" data-id="${this.id}" data-user-id="${this.userId}" data-level="${this.getCommentLevel()}">
                    <div class="sender">
                        ${username}
                        ${this.parentId ? `<span class="reply-indicator">↪ 回复 ${parentName}</span>` : ''}
                    </div>
                    <div class="message">${this.escapeHtml(this.content)}</div>
                    <div class="date">
                        <span class="time">📅 ${new Date(this.createdAt).toLocaleDateString()}</span>
                        <span class="likes">
                            ❤️ ${this.likes}
                        </span>
                        <button class="reply-btn" data-id="${this.id}" data-user="翱三班${this.userId}号"  data-anonymous="${this.anonymous}">💬 回复</button>
                    </div>
                </div>`;

                commentsShow.innerHTML += commentHtml;
            }

            getCommentLevel() {
                let level = 0;
                let currentId = this.parentId;
                const commentMap = new Map(this.all.map(c => [c[0], c]));

                while (currentId && commentMap.has(currentId)) {
                    level++;
                    currentId = commentMap.get(currentId)[4]; // parent_id
                    if (level > 5) break;
                }
                return Math.min(level, 5);
            }

            escapeHtml(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        }

        // 获取当前用户
        function getCurrentUser() {
            const userId = sessionStorage.getItem("userID");
            if (userId) {
                return {
                    id: parseInt(userId),
                    isTeacher: sessionStorage.getItem("isTeacher") === "true"
                };
            }
            return null;
        }

        // 发送评论
        function sendComment() {
            const input = document.querySelector("#comment-input");
            const content = input.value.trim();

            if (!content) {
                alert("📝 评论内容不能为空");
                return;
            }

            const user = getCurrentUser();
            if (!user) {
                alert("🔒 请先登录后再评论");
                window.location.href = "/login";
                return;
            }

            const targetId = parseInt(document.querySelector("#content").dataset.passageId);
            const isStu = document.querySelector("#content").dataset.isStu === "True";
            const isAnonymous = document.querySelector("#anonymous-checkbox").checked;
            console.log(isAnonymous);

            const commentData = {
                user_id: user.id,
                content: content,
                parent_id: currentReply.parentId || null,
                anonymous: isAnonymous
            };

            if (isStu) {
                commentData.student_id = targetId;
            } else {
                commentData.article_id = targetId;
            }

            fetch("/api/comments/add", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(commentData)
            })
                .then(res => res.json())
                .then(data => {
                    if (data.status === "success") {
                        input.value = "";
                        cancelReply();
                        refreshComments(targetId, isStu);
                        // 显示成功提示
                        const msgDiv = document.createElement('div');
                        msgDiv.textContent = '✅ 评论发送成功！';
                        msgDiv.style.cssText = 'color: green; font-size: 0.85rem; margin-top: 0.5rem;';
                        document.querySelector(".input-area").appendChild(msgDiv);
                        setTimeout(() => msgDiv.remove(), 3000);
                    } else {
                        alert("❌ 评论失败：" + (data.msg || "未知错误"));
                    }
                })
                .catch(err => {
                    console.error("发送评论失败", err);
                    alert("网络错误，请稍后重试");
                });
        }

        function refreshComments(targetId, isStu) {
            document.querySelector("#comments-show").innerHTML = '<div class="loading-comments">加载评论中</div>';
            getComments(targetId, isStu);
        }

        function cancelReply() {
            currentReply = {parentId: null, userName: null};
            document.querySelector("#reply-status").style.display = 'none';
            document.querySelector("#comment-input").placeholder = "📖 分享你的想法...";
        }

        function setReply(parentId, userName, anonymous) {
            currentReply = {parentId: parentId, userName: userName};
            document.querySelector("#reply-status").style.display = 'flex';
            document.querySelector("#reply-to-name").textContent = anonymous ? "匿名用户" : userName;
            document.querySelector("#comment-input").placeholder = anonymous ? "回复匿名用户" : `💬 回复 ${userName}...`;
            document.querySelector("#comment-input").focus();
        }

        // 处理语录显示
        function handleSaying() {
            const sayingsSection = document.querySelector(".sayings-section");
            const sayings = document.querySelector("#sayings");
            if (sayingsSection && (!sayings || !sayings.innerHTML || sayings.innerHTML === ""
                || sayings.innerHTML === "暂未统计语录" || sayings.innerHTML === "[内容处理错误]")) {
                sayingsSection.style.display = 'none';
            }

            // 特定用户隐藏语录
            if (!settings.showSayings) {
                if (sayingsSection) sayingsSection.style.display = 'none';
                const hideParas = document.querySelectorAll(".hide");
                hideParas.forEach(hidePara => hidePara.style.display = 'none');
            }
        }

        // 添加编辑链接
        function addEditLink(content) {
            const userId = parseInt(sessionStorage.getItem("userID"));
            const username = sessionStorage.getItem("user");
            const title = document.querySelector("#title").textContent;
            const name = title.replace(/[记传]$/, '');

            if (userId >= 61 || username === name) {
                const slug = content.dataset.slug;
                const isStu = content.dataset.isStu === "True";
                const editLink = document.createElement('a');
                editLink.href = `/edit?slug=${slug}&type=${isStu ? 'student' : 'article'}`;
                editLink.className = 'edit-link';
                editLink.textContent = '✏️ 参与编辑';
                document.querySelector("#author").after(editLink);
            }
        }

        // 窗口消息监听
        window.addEventListener("message", e => {
            const allowedOrigins = ["http://129.211.162.48:3", "https://www.cjchcoderchat.site:3"];
            if (!allowedOrigins.includes(e.origin)) return;
            if (e.data && e.data.type === "AUTH_STATE" && e.data.isLoggedIn) {
                sessionStorage.setItem("user", e.data.user);
                sessionStorage.setItem("isTeacher", e.data.isTeacher.toString());
                sessionStorage.setItem("userID", e.data.userId);
            }
        });
    </script>
    <script src="../static/js/secret20260628.js"></script>
</head>
<body>
<div id="app">
<div class="article-container">
    <!-- 文章类型标识 -->
    <div class="article-badge {% if article.is_stu %}badge-student{% else %}badge-teacher{% endif %}">
        {% if article.is_stu %}🎓 学生传记{% else %}📖 教师传记{% endif %}
    </div>

    <h1 id="title">{{ article.title|default('无标题') }}</h1>

    <article id="content" data-passage-id="{{ article.id }}" data-is-stu="{{ article.is_stu }}" data-slug="{{ article.slug }}">
        {{ article.content|default('')|safe }}
    </article>

    <p id="author">{{ article.author|default('作者：未知') }}</p>

    <!-- 语录区域 - 仅教师文章显示 -->
    {% if not article.is_stu %}
    <div class="sayings-section">
        <h2>📜 语录</h2>
        <div id="sayings">{{ article.sayings|default('暂未统计语录')|safe }}</div>
    </div>
    {% endif %}

    <button id="createShareLink"> 创建分享链接 </button>

    <!-- 评论区域 - 所有文章都支持评论 -->
    <div id="comments">
        <h3>💬 评论互动</h3>
        <div id="comments-show">
            <div class="loading-comments">加载评论中</div>
        </div>

        <div class="input-area">
            <label for="comment-input">📝 写评论</label>
            <input id="comment-input" placeholder="📖 虚拟空间存法度，匿名背后有青天。">
            <button id="submit-comment">发送评论</button>
        </div>

        <div id="reply-status" style="display: none;">
            <span>💬</span> 回复 <span id="reply-to-name"></span>
            <button id="cancel-reply">取消回复</button>
        </div>

        <div id="for-anonymous">
            <input type="checkbox" id="anonymous-checkbox">
            <label for="anonymous-checkbox">开启匿名</label>
        </div>
    </div>
</div>
</div>
<div id="verify-container"></div>
<script>
    async function log() {
        const user = sessionStorage.getItem("user");
        const psgName = document.querySelector("#title").innerText;
        await fetch("/api/log", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({user: user, action: "浏览:" + psgName})
        });
    }

    function init() {
        log();
        handleSaying();
        const createShareLinkBtn = document.querySelector('#createShareLink');
        createShareLinkBtn.addEventListener('click', async () => {
            const contentEl = document.querySelector('#content');
            const slug = contentEl.dataset.slug;
            const isStu = contentEl.dataset.isStu === "True";
            const type = isStu ? "s" : "t";
            const url = window.location.host + "/share?slug=" + slug + "&t=" + type;
            try {
                await navigator.clipboard.writeText(url);
                alert("链接已复制到剪切板！");
                window.open("/share?slug=" + slug + "&t=" + type);
            } catch (e) {
                console.error(e);
                alert("链接复制失败！");
            }
        });
    }

    document.addEventListener("verifySuccess", () => {
        init();
        const contentElement = document.querySelector("#content");
        const targetId = parseInt(contentElement.dataset.passageId);
        const isStu = contentElement.dataset.isStu === "True";

        // 添加编辑链接
        addEditLink(contentElement);

        // 加载评论
        getComments(targetId, isStu);

        // 绑定评论事件
        const submitBtn = document.querySelector("#submit-comment");
        const commentInput = document.querySelector("#comment-input");
        const cancelReplyBtn = document.querySelector("#cancel-reply");
        const commentsShow = document.querySelector("#comments-show");

        if (submitBtn) {
            submitBtn.addEventListener("click", sendComment);
        }

        if (commentInput) {
            commentInput.addEventListener("keypress", (e) => {
                if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    sendComment();
                }
            });
        }

        if (cancelReplyBtn) {
            cancelReplyBtn.addEventListener("click", cancelReply);
        }

        if (commentsShow) {
            commentsShow.addEventListener("click", (e) => {
                if (e.target.classList.contains("reply-btn")) {
                    const commentId = e.target.dataset.id;
                    const userName = e.target.dataset.user;
                    const anonymous = e.target.dataset.anonymous === "1";
                    setReply(parseInt(commentId), userName, anonymous);
                }
            });
        }
    });
</script>
</body>
</html>
