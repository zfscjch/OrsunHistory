<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>翱三通史 - 人脸识别系统</title>
    <link rel="stylesheet" href="./../static/css/face.css">
    <script defer>
        /**
         * 显示对话框并获取用户输入
         * @param {string} message - 请求输入的内容
         * @param {string} placeholderText - 输入框提示语
         * @param {string} type - 输入框属性
         * @param {boolean} isRequired - 是否必填
         * @returns {Promise<string>} 用户回答的Promise
         */
        function dialog(message, placeholderText, type = "text", isRequired = true) {
            return new Promise((resolve, reject) => {
                const dialog = document.querySelector("#ensure-sth");
                const description = document.querySelector("#description");
                const input = document.querySelector("#question");

                // 设置对话框内容
                description.innerHTML = message;
                input.placeholder = placeholderText;
                input.type = type;
                input.required = isRequired;
                input.value = ""; // 清空之前的值

                // 显示对话框
                dialog.showModal();

                // 确定按钮事件
                document.querySelector("#sure").onclick = () => {
                    const answer = input.value.trim();
                    if (!isRequired || (isRequired && answer)) {
                        dialog.close();
                        resolve(answer);
                    }
                    // 如果必填且为空，浏览器会自动显示验证提示
                };

                // 取消按钮事件
                document.querySelector("#cancel").onclick = () => {
                    dialog.close();
                    reject("cancel by user"); // 返回空字符串表示取消
                };

                // 回车键提交
                input.onkeypress = (e) => {
                    if (e.key === 'Enter') {
                        document.querySelector("#sure").click();
                    }
                };

                // 点击背景关闭（可选）
                dialog.onclick = (e) => {
                    if (e.target === dialog) {
                        dialog.close();
                        reject("cancel by user");
                    }
                };
            });
        }
    </script>
</head>
<body>
<dialog id="ensure-sth">
    <div class="dialog-content">
        <label for="question" id="description"></label>
        <input id="question">
        <div class="button-group">
            <button class="close-btn" id="sure">确定</button>
            <button class="close-btn" id="cancel">取消</button>
        </div>
    </div>
</dialog>

<div class="container">
    <header>
        <h1>🎭 人脸识别系统</h1>
        <p class="subtitle">前后端分离 | 实时识别</p>
    </header>

    <div class="main-content">
        <!-- 左侧：视频区域 -->
        <div class="video-section">
            <div class="video-container">
                <video id="video" autoplay muted playsinline></video>
                <canvas id="overlayCanvas" class="overlay-canvas"></canvas>
            </div>
            <div class="video-controls">
                <button id="startCameraBtn" class="btn btn-primary">📷 启动摄像头</button>
                <button id="captureBtn" class="btn btn-success" disabled>🎯 识别当前画面</button>
                <button id="stopCameraBtn" class="btn btn-warning" disabled>⏹️ 关闭摄像头</button>
            </div>
        </div>

        <!-- 右侧：控制和结果区域 -->
        <div class="control-section">
            <!-- 识别结果 -->
            <div class="result-panel">
                <h3>🔍 识别结果</h3>
                <div id="resultArea" class="result-area">
                    <div class="info-message">等待识别...</div>
                </div>
            </div>
            <div>
                <a href="/issues">识别失败？向安全中心反映问题</a>
            </div>
        </div>
    </div>
</div>

<script>
    // API配置
    let videoStream = null;
    let isRecognizing = false;

    // DOM元素
    const video = document.getElementById('video');
    const overlayCanvas = document.getElementById('overlayCanvas');
    const ctx = overlayCanvas.getContext('2d');
    const startCameraBtn = document.getElementById('startCameraBtn');
    const captureBtn = document.getElementById('captureBtn');
    const stopCameraBtn = document.getElementById('stopCameraBtn');
    const resultArea = document.getElementById('resultArea');

    // ==================== 摄像头控制 ====================
    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: {
                    width: { ideal: 640 },
                    height: { ideal: 480 },
                    facingMode: 'user'
                }
            });

            videoStream = stream;
            video.srcObject = stream;
            await video.play();

            // 设置canvas尺寸与视频一致
            overlayCanvas.width = video.videoWidth;
            overlayCanvas.height = video.videoHeight;

            startCameraBtn.disabled = true;
            captureBtn.disabled = false;
            stopCameraBtn.disabled = false;

            console.log('摄像头已启动');
        } catch (error) {
            console.error('摄像头启动失败:', error);
            alert('无法访问摄像头，请检查权限设置');
        }
    }

    function stopCamera() {
        if (videoStream) {
            videoStream.getTracks().forEach(track => track.stop());
            videoStream = null;
            video.srcObject = null;

            startCameraBtn.disabled = false;
            captureBtn.disabled = true;
            stopCameraBtn.disabled = true;

            // 清空画布
            ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

            console.log('摄像头已关闭');
        }
    }

    // ==================== 人脸识别 ====================
    async function captureAndRecognize() {
        if (!videoStream || isRecognizing) return;

        isRecognizing = true;
        captureBtn.disabled = true;

        try {
            // 截取当前视频帧
            const imageData = captureCurrentFrame();

            // 显示识别中状态
            resultArea.innerHTML = '<div class="info-message">🤔 识别中...</div>';

            // 发送到后端识别
            const response = await fetch(`/face/recognize`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ image: imageData })
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }

            const result = await response.json();
            console.log(result);

            if (result.status === "success") {
                resultArea.innerHTML = `识别用户为：${result.user}，正在跳转……`;
                const pwd = await dialog(`识别用户为：${result.user}，为确保安全，请重置密码`, "请输入重置密码", "password");
                savePassword(result.user_id, pwd);
                sessionStorage.setItem("user", result.user);
                sessionStorage.setItem("isTeacher", result.isT);
                sessionStorage.setItem("userID", result.user_id);
                setTimeout(() => {
                    window.location.href = "/";
                }, 1000);
            } else {
                resultArea.innerHTML = `<div class="info-message">❌ 识别失败: ${result.message}</div>`;
            }
        } catch (error) {
            console.error('识别请求失败:', error);
            resultArea.innerHTML = `<div class="info-message">❌ 连接后端失败: ${error.message}</div>`;
        } finally {
            isRecognizing = false;
            captureBtn.disabled = false;
        }
    }

    function savePassword(id, pwd) {
        fetch("/api/savePwd", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({user_id: id, pwd: pwd})
        })
            .then(res => res.json())
            .then(data => {
                console.log(data);
                if (data.status === "success") {
                    alert("密码保存成功！");
                }
            })
            .catch(error => {
                console.log(error);
                alert("密码保存失败！");
            })
    }

    function captureCurrentFrame() {
        // 创建临时canvas
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const tempCtx = canvas.getContext('2d');

        // 绘制当前视频帧（注意保持镜像效果）
        tempCtx.save();
        tempCtx.scale(-1, 1);
        tempCtx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
        tempCtx.restore();

        // 转换为base64
        return canvas.toDataURL('image/jpeg', 0.8);
    }

    // ==================== 事件绑定 ====================
    startCameraBtn.addEventListener('click', startCamera);
    stopCameraBtn.addEventListener('click', stopCamera);
    captureBtn.addEventListener('click', captureAndRecognize);
</script>
</body>
</html>
