<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>翱三通史 - 主页</title>
    <link rel="stylesheet" href="./../static/css/common.css">
    <style>
        .issue {
            color: #dacbb2;
            text-decoration: none;
            border-bottom: 1px dotted #cbb291;
            transition: all 0.2s ease;
        }
        .issue:hover {
            color: #b5956b;
            border-bottom-color: #7a623e;
        }

        body::before {
            content: '翱三通史·老师本纪';
            position: fixed;
            bottom: 12px;
            right: 20px;
            font-size: 0.9rem;
            color: #67553d;
            background: #efe6d4c0;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            border: 1px solid #bba27a;
            backdrop-filter: blur(2px);
            box-shadow: 0 2px 6px #221e14;
            font-family: 'Courier New', '宋体', monospace;
            letter-spacing: 2px;
            z-index: 10;
        }
    </style>
</head>
<body>
<h1>翱三通史主页</h1>
<a href="/issues" class="issue">问题反馈</a>
<div id="psg">
    <a href="./intro" class="intro">简介</a>
    <a href="./stu">学生传记</a>
</div>

<!-- 添加新的仿古签条链接 ✻ 甲辰校勘 ✻  -->
<a href="/author" class="signature-container signature-link">✻ 甲辰校勘 ✻</a>
<button class="signature-container signature-btn" onclick="logout()">✻ 退出登录 ✻</button>

<script>
    const user = sessionStorage.getItem('user');
    if (!user) window.location.href = '/login';

    function logout() {
        sessionStorage.clear();
        sessionStorage.setItem('fromIndex', '1');
        location.reload();
    }

    function getArticle(author) {
        const data = {author: author, type: "article"};
        fetch("/api/get-articles", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"   // 修正大小写
            },
            body: JSON.stringify(data)
        })
            .then((res) => res.json())
            .then((data) => {
                console.log(data);
                // 判断无文章或空数据
                if (!data || !data.data || data.data.length === 0) {
                    const li = document.querySelector("#psg");
                    li.innerHTML = "<p>📜 没有文章</p>";
                    return;
                }
                showArticle(data.data);
            })
            .catch((err) => {
                console.log(err);
                document.querySelector("#psg").innerHTML = "<p>❌ 载入失败，请稍后重试</p>";
            });
    }

    function showArticle(d) {
        const li = document.querySelector("#psg");
        // 确保 d 是数组且有内容
        if (!Array.isArray(d) || d.length === 0) {
            return;
        }
        let html = '';
        d.forEach((item) => {
            // 假设 item[0] 是标题或标识，item[1] 是 slug
            html += `<a href="/psg/${encodeURIComponent(item[1])}">${escapeHtml(item[0]) || '无题'}</a>`;
        });
        li.innerHTML += html;
        const aLinks = document.querySelectorAll("#psg a");
        aLinks.forEach(aLink => {
            aLink.addEventListener("click", (e) => {
                e.preventDefault();
                const popup = window.open(aLink.href);
                popup.postMessage({
                    type: "AUTH_STATE",
                    isLoggedIn: true,
                    user: sessionStorage.getItem("user"),
                    isTeacher: sessionStorage.getItem("isTeacher") === "true",
                    userId: sessionStorage.getItem("userID"),
                }, "https://www.cjchcoderchat.site:3");
            });
        });
    }

    // 简单的防XSS转义
    function escapeHtml(unsafe) {
        if (!unsafe) return unsafe;
        return unsafe
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    document.addEventListener("DOMContentLoaded", () => {
        getArticle(".*");
    });
</script>
</body>
</html>
