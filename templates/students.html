<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>翱三通史</title>
    <link rel="stylesheet" href="./../static/css/common.css">
    <style>
        .hint {
            color: white;
        }

        body::before {
            content: '翱三通史·学生传记';
            position: fixed;
            bottom: 12px;
            right: 20px;
            font-size: 0.9rem;
            color: #67553d;
            background: #efe6d4c0;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            border: 1px solid #bba27a;
            backdrop-filter: blur(2px);
            box-shadow: 0 2px 6px #221e14;
            font-family: 'Courier New', '宋体', monospace;
            letter-spacing: 2px;
            z-index: 10;
        }

        /* 覆盖为三列 */
        #psg {
            grid-template-columns: repeat(3, 1fr);
        }
    </style>
    <script>
        window.addEventListener("message", e => {
            const allowedOrigins = ["https://www.cjchcoderchat.site:3"];
            if (!allowedOrigins.includes(e.origin)) return;
            if (e.data && e.data.type === "AUTH_STATE" && e.data.isLoggedIn) {
                sessionStorage.setItem("user", e.data.user);
                sessionStorage.setItem("isTeacher", e.data.isTeacher.toString());
                sessionStorage.setItem("userID", e.data.userId);
            }
        });
    </script>
</head>
<body>
<h1>翱三通史·学生传记</h1>
<div class="hint">【注意】本人可以编辑自己的传记！（提交秘钥：admin?pwd=123456）</div>
<div id="psg"></div>

<!-- 添加新的仿古签条链接 ✻ 甲辰校勘 ✻  -->
<a href="/author" class="signature-container signature-link">✻ 甲辰校勘 ✻</a>
<button class="signature-container signature-btn" onclick="logout()">✻ 退出登录 ✻</button>

<script>
    const user = sessionStorage.getItem('user');
    if (!user) window.location.href = '/login';
    const isTeacher = sessionStorage.getItem("isTeacher");

    function logout() {
        sessionStorage.clear();
        location.reload();
    }

    function getArticle(author) {
        const data = {author: author, type: "students"};
        fetch("/api/get-articles", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"   // 修正大小写
            },
            body: JSON.stringify(data)
        })
            .then((res) => res.json())
            .then((data) => {
                console.log(data);
                // 判断无文章或空数据
                if (!data || !data.data || data.data.length === 0) {
                    const li = document.querySelector("#psg");
                    li.innerHTML = "<p>📜 没有文章</p>";
                    return;
                }
                showArticle(data.data);
            })
            .catch((err) => {
                console.log(err);
                document.querySelector("#psg").innerHTML = "<p>❌ 载入失败，请稍后重试</p>";
            });
    }

    function showArticle(d) {
        const li = document.querySelector("#psg");
        // 确保 d 是数组且有内容
        if (!Array.isArray(d) || d.length === 0) {
            return;
        }
        let html = '';
        d.forEach((item) => {
            // 假设 item[0] 是标题或标识，item[1] 是 slug
            html += `<a href="/student/${encodeURIComponent(item[1])}">${escapeHtml(item[0]) || '无题'}</a>`;
        });
        li.innerHTML += html;
        const aLinks = document.querySelectorAll("#psg a");
        aLinks.forEach(aLink => {
            aLink.addEventListener("click", (e) => {
                e.preventDefault();
                const popup = window.open(aLink.href);
                popup.postMessage({
                    type: "AUTH_STATE",
                    isLoggedIn: true,
                    user: sessionStorage.getItem("user"),
                    isTeacher: sessionStorage.getItem("isTeacher") === "true",
                    userId: sessionStorage.getItem("userID"),
                }, "https://www.cjchcoderchat.site:3/");
            });
        });
    }

    // 简单的防XSS转义
    function escapeHtml(unsafe) {
        if (!unsafe) return unsafe;
        return unsafe
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    document.addEventListener("DOMContentLoaded", () => {
        getArticle(".*");
    });
</script>
</body>
</html>
