<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>翱三通史</title>
    <style>
        /* 全局重置与基调 —— 仿佛古籍的底色 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #2b2b1f;  /* 深檀木色底，模拟历史沉淀 */
            font-family: 'Georgia', 'Times New Roman', '宋体', 'Songti SC', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
            background-image:
                    radial-gradient(circle at 10% 20%, rgba(200, 180, 140, 0.05) 0px, transparent 20%),
                    radial-gradient(circle at 90% 80%, rgba(160, 130, 80, 0.08) 0px, transparent 30%),
                    repeating-linear-gradient(45deg, rgba(120, 90, 50, 0.02) 0px, rgba(120, 90, 50, 0.02) 2px, transparent 2px, transparent 6px);
        }

        /* 主卡片 —— 仿若一本摊开的史册 */
        h1 {
            font-size: 3rem;
            font-weight: 400;
            letter-spacing: 6px;
            color: #e8d6b5;          /* 骨白带微黄，久远纸色 */
            text-shadow: 3px 3px 0 #3a2e1e, 6px 6px 0 #1f1a10;
            margin-bottom: 3rem;
            border-bottom: 2px solid #b99e7c;
            padding-bottom: 0.5rem;
            display: inline-block;
            font-family: 'Times New Roman', '宋体', serif;
            text-transform: uppercase;
            word-break: keep-all;
            position: relative;
        }

        /* 增加一点斑驳的装饰 (史书标题下的暗纹) */
        h1::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 10%;
            width: 80%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #b99e7c, #dac292, #b99e7c, transparent);
        }

        /* 导航/列传容器 —— 现在容纳多位先贤 */
        #psg {
            /* 浅米色纸基 */
            background: #f7efe0 linear-gradient(145deg, #f3ead9 0%, #faf3e2 70%);
            border: 1px solid #bbaa8a;
            border-radius: 32px 32px 24px 24px;  /* 稍圆润，保持古籍感 */
            box-shadow:
                    0 20px 30px -10px rgba(0,0,0,0.7),
                    inset 0 0 0 1px #fff6e5,
                    inset 2px 2px 8px rgba(255, 245, 215, 0.8);
            padding: 3rem 4rem;
            margin: 1.5rem 0;
            position: relative;
            transition: box-shadow 0.3s ease;
            /* 使内部链接灵活排列，适应两个列传 */
            /*display: flex;
            flex-wrap: wrap;*/
            justify-content: center;
            align-items: center;
            gap: 2rem 2.5rem;
            display: grid;
            grid-template-columns: repeat(3, 1fr);  /* 创建两列等宽布局 */
        }

        /* 古书虫蚀 / 毛边效果 (装饰用伪元素) */
        #psg::before {
            content: '';
            position: absolute;
            top: -4px; left: -4px; right: -4px; bottom: -4px;
            border: 1px solid rgba(140, 110, 70, 0.2);
            border-radius: 36px 36px 28px 28px;
            pointer-events: none;
            box-shadow: inset 0 0 20px #bba27a40;
        }

        /* 史传链接 —— 适用于所有先贤列传 */
        #psg a {
            display: inline-block;
            font-size: 2.2rem;
            font-weight: normal;
            color: #3c2e1f;
            text-decoration: none;
            padding: 0.8rem 2.2rem;
            background: #e5d8c1;
            background: linear-gradient(145deg, #dac9ae, #efdfc7);
            border: 1px solid #b5956b;
            border-radius: 60px;
            box-shadow:
                    0 8px 0 #7a623e,
                    0 12px 18px -8px #1f1a0e,
                    inset 0 -2px 4px #fff4dd,
                    inset 0 2px 4px #fffff0;
            font-family: 'Georgia', 'Times New Roman', '宋体', serif;
            letter-spacing: 2px;
            transition: all 0.15s ease-in-out;
            position: relative;
            text-shadow: 1px 1px 0 #fff3e0;
            white-space: nowrap;
            /* 保证 flex 子项不会压缩变形 */
            flex: 0 1 auto;
        }

        /* 模拟线装书的穿线装饰 (呼应主题) 适用于所有列传链接 */
        #psg a::before,
        #psg a::after {
            content: '❦';        /* 历史手稿中的装饰符 */
            font-size: 1.5rem;
            color: #a57c54;
            opacity: 0.7;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            text-shadow: none;
            /* 确保装饰不干扰点击 */
            pointer-events: none;
        }

        #psg a::before {
            left: 10px;
        }

        #psg a::after {
            right: 10px;
        }

        /* 鼠标悬停 —— 像是翻开新的篇章 */
        #psg a:hover {
            transform: translateY(4px);
            box-shadow:
                    0 4px 0 #7a623e,
                    0 16px 24px -10px #0a0804,
                    inset 0 -1px 3px #fff1d6,
                    inset 0 1px 5px #fffff0;
            background: linear-gradient(145deg, #d2bea0, #ebdac2);
            color: #241b10;
            border-color: #b07d4c;
        }

        /* 点击瞬间的按压感 */
        #psg a:active {
            transform: translateY(8px);
            box-shadow:
                    0 0 0 #7a623e,
                    0 18px 20px -12px #0f0b06,
                    inset 0 -2px 4px #cfb894;
        }

        /* 访问后仍保持古拙色调，不做强烈区分 */
        #psg a:visited {
            color: #3f3324;
            background: #dacbb2;
        }

        /* 古籍中的夹页效果 —— 在链接下方加一条仿手写注记，保持统一 */
        #psg::after {
            content: '⸻  ⸻  卷帙浩渺  先贤列传  ⸻  ⸻';
            display: block;
            text-align: center;
            font-size: 1rem;
            color: #8f7b5f;
            letter-spacing: 3px;
            margin-top: 2rem;
            font-style: italic;
            font-family: 'Times New Roman', '楷体', serif;
            border-top: 1px dashed #cbb291;
            padding-top: 1.5rem;
            opacity: 0.8;
            width: 100%;          /* 保证在flex容器中占满整行 */
            grid-column: 1 / -1;
        }

        /* 自适应移动端：保持可读性，调小尺寸 */
        @media (max-width: 700px) {
            h1 {
                font-size: 2.4rem;
                letter-spacing: 3px;
                text-shadow: 2px 2px 0 #3a2e1e, 4px 4px 0 #1f1a10;
            }
            #psg {
                padding: 2.5rem 2rem;
                gap: 1.5rem;       /* 移动端适当缩小间隙 */
            }
            #psg a {
                font-size: 1.8rem;
                padding: 0.6rem 1.8rem;
                white-space: normal;
                word-break: keep-all;
            }
            #psg a::before {
                left: 5px;
                font-size: 1.2rem;
            }
            #psg a::after {
                right: 5px;
                font-size: 1.2rem;
            }
        }

        /* 对于超小屏，干脆去掉两侧装饰符避免拥挤，并让链接纵向堆叠 */
        @media (max-width: 500px) {
            #psg {
                flex-direction: column;
                align-items: stretch;
                padding: 2rem 1.2rem;
            }
            #psg a {
                font-size: 1.8rem;
                padding: 0.8rem 1rem;
                text-align: center;
            }
            #psg a::before,
            #psg a::after {
                display: none;      /* 小屏上装饰符让空间更紧张，故隐去 */
            }
        }

        /* 对于超小屏，继续微调 */
        @media (max-width: 420px) {
            h1 {
                font-size: 2rem;
            }
            #psg a {
                font-size: 1.5rem;
                padding: 0.6rem 0.8rem;
            }
        }

        /* 可选：增加页面的整体仿古氛围——题跋效果 (保持不变) */
        body::before {
            content: '翱三通史·学生传记';
            position: fixed;
            bottom: 12px;
            right: 20px;
            font-size: 0.9rem;
            color: #67553d;
            background: #efe6d4c0;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            border: 1px solid #bba27a;
            backdrop-filter: blur(2px);
            box-shadow: 0 2px 6px #221e14;
            font-family: 'Courier New', '宋体', monospace;
            letter-spacing: 2px;
            z-index: 10;
        }

        /* ========= 修改开始：将原来的纯文字签条改为 <a> 链接 ========= */
        /* 简单增加一个纵向的仿古签条 (左侧) —— 现在是一个可点击的链接 */
        body .signature-link {
            top: 30%;
        }

        body .signature-btn {
            top: 60%;
        }

        /* 悬停效果：仿古签条颜色稍微提亮，增加立体感 */
        body .signature-container:hover {
            background: #5f4f39;
            color: #f0e2ce;
            border-color: #dbbc93;
            box-shadow: 4px 6px 16px #221e14;
            letter-spacing: 8px;           /* 轻微展开，增加互动 */
        }

        /* 点击时的短暂压暗效果 */
        body .signature-container:active {
            background: #3a2f20;
            color: #bba27a;
            box-shadow: 1px 2px 8px #0f0d09;
            transform: translateX(2px);    /* 轻微右移，模拟按压 */
        }

        body .signature-container {
            position: fixed;
            left: 0;
            background: #493e2d;
            color: #dacbbc;
            padding: 0.8rem 0.2rem;
            writing-mode: vertical-rl;
            font-size: 0.8rem;
            border-radius: 0 12px 12px 0;
            letter-spacing: 6px;
            border: 1px solid #ad9b7c;
            border-left: none;
            box-shadow: 2px 4px 12px #0f0d09;
            text-shadow: 0 0 2px #dec393;
            font-family: 'Times New Roman', '楷体', serif;
            z-index: 10;
            text-decoration: none;        /* 去掉下划线 */
            transition: all 0.2s ease;
            line-height: 1.4;             /* 调整字间距 */
            cursor: pointer;               /* 鼠标指针 */
        }

        /* 为了和之前的 body::after 完全区分开，我们移除原来的 body::after 样式 */
        /* 原样式中 body::after 现在被替换为 .signature-link，故需将其禁用 */
        body::after {
            display: none;  /* 隐藏原来纯文本的签条，用新的链接元素代替 */
        }
        /* ========= 修改结束 ========= */

    </style>
</head>
<body>
<h1>翱三通史·学生传记</h1>
<div id="psg">
</div>

<!-- 添加新的仿古签条链接 ✻ 甲辰校勘 ✻  -->
<a href="/author" class="signature-container signature-link">✻ 甲辰校勘 ✻</a>
<button class="signature-container signature-btn" onclick="logout()">✻ 退出登录 ✻</button>

<script>
    const user = sessionStorage.getItem('user');
    if (!user) window.location.href = '/login';
    const isTeacher = sessionStorage.getItem("isTeacher");

    function logout() {
        sessionStorage.clear();
        location.reload();
    }

    function getArticle(author) {
        const data = {author: author, type: "students"};
        fetch("/api/get-articles", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"   // 修正大小写
            },
            body: JSON.stringify(data)
        })
            .then((res) => res.json())
            .then((data) => {
                console.log(data);
                // 判断无文章或空数据
                if (!data || !data.data || data.data.length === 0) {
                    const li = document.querySelector("#psg");
                    li.innerHTML = "<p>📜 没有文章</p>";
                    return;
                }
                showArticle(data.data);
            })
            .catch((err) => {
                console.log(err);
                document.querySelector("#psg").innerHTML = "<p>❌ 载入失败，请稍后重试</p>";
            });
    }

    function showArticle(d) {
        const li = document.querySelector("#psg");
        // 确保 d 是数组且有内容
        if (!Array.isArray(d) || d.length === 0) {
            return;
        }
        let html = '';
        d.forEach((item) => {
            // 假设 item[0] 是标题或标识，item[1] 是 slug
            html += `<a href="/student/${encodeURIComponent(item[1])}">${escapeHtml(item[0]) || '无题'}</a>`;
        });
        li.innerHTML += html;
        const aLinks = document.querySelectorAll("#psg a");
        aLinks.forEach(aLink => {
            aLink.addEventListener("click", (e) => {
                e.preventDefault();
                const popup = window.open(aLink.href);
                popup.postMessage({
                    type: "AUTH_STATE",
                    isLoggedIn: true,
                    user: sessionStorage.getItem("user"),
                    isTeacher: sessionStorage.getItem("isTeacher") === "true",
                    userId: sessionStorage.getItem("userID"),
                }, "http://129.211.162.48:3/index");
            });
        });
    }

    // 简单的防XSS转义
    function escapeHtml(unsafe) {
        if (!unsafe) return unsafe;
        return unsafe
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    document.addEventListener("DOMContentLoaded", () => {
        getArticle(".*");
    });
</script>
</body>
</html>
