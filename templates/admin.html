<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翱三通史 · 管理员界面</title>
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
            position: relative;
            overflow: hidden;
        }

        /* ===== 背景动态粒子效果 ===== */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(102, 126, 234, 0.1) 0%, transparent 50%),
            radial-gradient(circle at 80% 20%, rgba(118, 75, 162, 0.1) 0%, transparent 50%),
            radial-gradient(circle at 50% 80%, rgba(237, 100, 166, 0.08) 0%, transparent 50%);
            animation: floatBackground 20s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes floatBackground {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-10%, -10%) rotate(5deg); }
        }

        /* ===== 主卡片容器 ===== */
        .admin-container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 50px 60px;
            max-width: 700px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6),
            inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transform: translateY(30px);
            opacity: 0;
        }

        @keyframes fadeInUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* ===== 头部区域 ===== */
        .admin-header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .admin-header .shield-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
            animation: pulseGlow 3s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(102, 126, 234, 0.3)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 25px rgba(102, 126, 234, 0.6)); }
        }

        .admin-header h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #4facfe 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 4s ease-in-out infinite;
            letter-spacing: 2px;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .admin-header .subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            margin-top: 8px;
            letter-spacing: 4px;
            font-weight: 300;
        }

        /* ===== 功能卡片网格 ===== */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            margin-top: 10px;
        }

        .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 28px 20px 24px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 18px;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            min-height: 120px;
        }

        /* 卡片背景光效 */
        .menu-item::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.03) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        .menu-item:hover::before {
            opacity: 1;
        }

        .menu-item:hover {
            transform: translateY(-6px) scale(1.02);
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .menu-item:active {
            transform: translateY(-2px) scale(0.98);
        }

        /* 每个卡片的图标颜色（不同颜色） */
        .menu-item:nth-child(1) .menu-icon {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .menu-item:nth-child(2) .menu-icon {
            background: linear-gradient(135deg, #f093fb, #f5576c);
        }

        .menu-item:nth-child(3) .menu-icon {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
        }

        .menu-icon {
            font-size: 30px;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            margin-bottom: 14px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .menu-item:hover .menu-icon {
            transform: scale(1.1) rotate(-3deg);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.3);
        }

        .menu-label {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
            text-align: center;
            line-height: 1.4;
        }

        .menu-label small {
            display: block;
            font-size: 12px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 4px;
            letter-spacing: 0.5px;
        }

        /* ===== 底部信息 ===== */
        .admin-footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.2);
            font-size: 12px;
            letter-spacing: 2px;
        }

        .admin-footer .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            margin-right: 8px;
            animation: blinkDot 2s ease-in-out infinite;
            vertical-align: middle;
        }

        @keyframes blinkDot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .admin-footer .version {
            color: rgba(255, 255, 255, 0.15);
        }

        /* ===== 悬浮装饰光晕（跟随鼠标） ===== */
        .glow {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.08) 0%, transparent 70%);
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 0;
            transition: left 0.3s ease, top 0.3s ease;
        }

        /* ===== 响应式设计 ===== */
        @media (max-width: 640px) {
            .admin-container {
                padding: 30px 24px;
                border-radius: 20px;
            }

            .admin-header h1 {
                font-size: 24px;
            }

            .admin-header .shield-icon {
                font-size: 36px;
            }

            .menu-grid {
                grid-template-columns: 1fr 1fr;
                gap: 14px;
            }

            .menu-item {
                padding: 20px 14px 18px;
                min-height: 100px;
            }

            .menu-icon {
                width: 48px;
                height: 48px;
                font-size: 24px;
                border-radius: 12px;
            }

            .menu-label {
                font-size: 14px;
            }

            .menu-label small {
                font-size: 11px;
            }

            .admin-footer {
                font-size: 11px;
                margin-top: 30px;
                padding-top: 20px;
            }
        }

        @media (max-width: 400px) {
            .menu-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .admin-container {
                padding: 24px 16px;
            }

            .admin-header h1 {
                font-size: 20px;
            }
        }

        /* ===== 加载入场动画（每个卡片依次出现） ===== */
        .menu-item {
            opacity: 0;
            animation: cardAppear 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .menu-item:nth-child(1) { animation-delay: 0.1s; }
        .menu-item:nth-child(2) { animation-delay: 0.2s; }
        .menu-item:nth-child(3) { animation-delay: 0.3s; }

        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
    </style>
</head>
<body>
<!-- 鼠标跟随光晕 -->
<div class="glow" id="glow"></div>

<div class="admin-container">
    <!-- 头部 -->
    <div class="admin-header">
        <span class="shield-icon">🛡️</span>
        <h1>管理员控制台</h1>
        <p class="subtitle">翱三通史 · 后台管理</p>
    </div>

    <!-- 功能菜单 -->
    <div class="menu-grid">
        <a href="./get-log" class="menu-item">
            <span class="menu-icon">📋</span>
            <span class="menu-label">
                    查看日志
                    <small>系统运行记录</small>
                </span>
        </a>
        <a href="./maintenance" class="menu-item">
            <span class="menu-icon">⚙️</span>
            <span class="menu-label">
                    管理服务器
                    <small>维护模式控制</small>
                </span>
        </a>
        <a href="./check-issues" class="menu-item">
            <span class="menu-icon">🔍</span>
            <span class="menu-label">
                    查看错误
                    <small>异常汇总处理</small>
                </span>
        </a>
    </div>

    <!-- 底部 -->
    <div class="admin-footer">
        <span class="status-dot"></span>
        系统运行中 ·
        <span class="version">v3.0</span>
        <br>
        <span style="font-size: 11px; opacity: 0.5;">
                翱三通史 · 内部管理工具
            </span>
    </div>
</div>

<script>
    // ===== 鼠标跟随光晕效果 =====
    const glow = document.getElementById('glow');

    document.addEventListener('mousemove', (e) => {
        glow.style.left = e.clientX + 'px';
        glow.style.top = e.clientY + 'px';
    });

    // ===== 卡片点击涟漪效果 =====
    document.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('click', function(e) {
            const ripple = document.createElement('span');
            const rect = this.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            const x = e.clientX - rect.left - size / 2;
            const y = e.clientY - rect.top - size / 2;

            ripple.style.cssText = `
                    position: absolute;
                    width: ${size}px;
                    height: ${size}px;
                    left: ${x}px;
                    top: ${y}px;
                    background: rgba(255, 255, 255, 0.15);
                    border-radius: 50%;
                    transform: scale(0);
                    animation: rippleEffect 0.6s ease-out forwards;
                    pointer-events: none;
                `;

            this.appendChild(ripple);

            setTimeout(() => {
                ripple.remove();
            }, 700);
        });
    });

    // 添加 ripple 动画（动态注入）
    const styleSheet = document.createElement('style');
    styleSheet.textContent = `
            @keyframes rippleEffect {
                to {
                    transform: scale(4);
                    opacity: 0;
                }
            }
        `;
    document.head.appendChild(styleSheet);
</script>
</body>
</html>
