<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翱三通史 · 管理员界面</title>
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f6f4f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
            margin: 0;
            line-height: 1.5;
            color: #1f1b17;
        }

        /* ===== 主卡片容器 ===== */
        .admin-container {
            max-width: 700px;
            width: 100%;
            background: #ffffff;
            padding: 2.8rem 2.5rem 2.2rem;
            border-radius: 28px;
            border: 1px solid #edeae5;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.02), 0 2px 6px rgba(0, 0, 0, 0.01);
            transition: box-shadow 0.2s ease;
        }
        .admin-container:hover {
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.02), 0 4px 12px rgba(0, 0, 0, 0.01);
            border-color: #e3dbd2;
        }

        /* ===== 头部区域 ===== */
        .admin-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e6e0d8;
        }

        .admin-header .shield-icon {
            font-size: 36px;
            display: block;
            margin-bottom: 8px;
        }

        .admin-header h1 {
            font-size: 28px;
            font-weight: 600;
            color: #2b241e;
            letter-spacing: 1px;
        }

        .admin-header .subtitle {
            color: #a39484;
            font-size: 14px;
            margin-top: 4px;
            letter-spacing: 2px;
            font-weight: 300;
        }

        /* ===== 功能卡片网格 ===== */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            margin-top: 10px;
        }

        .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px 20px;
            background: #faf9f7;
            border-radius: 18px;
            text-decoration: none;
            color: #1f1b17;
            border: 1px solid #edeae5;
            transition: all 0.25s ease;
            min-height: 120px;
        }
        .menu-item:hover {
            transform: translateY(-4px);
            background: #ffffff;
            border-color: #d6cbc0;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
        }
        .menu-item:active {
            transform: translateY(0px);
        }

        .menu-icon {
            font-size: 28px;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0ece6;
            border-radius: 14px;
            margin-bottom: 12px;
            transition: all 0.2s ease;
        }
        .menu-item:hover .menu-icon {
            background: #e6e0d8;
        }

        .menu-label {
            font-size: 16px;
            font-weight: 500;
            text-align: center;
            line-height: 1.4;
        }
        .menu-label small {
            display: block;
            font-size: 12px;
            font-weight: 400;
            color: #a39484;
            margin-top: 4px;
        }

        /* ===== 底部信息 ===== */
        .admin-footer {
            text-align: center;
            margin-top: 32px;
            padding-top: 20px;
            border-top: 1px solid #f0ebe5;
            color: #c6b9ab;
            font-size: 12px;
            letter-spacing: 1px;
        }

        .admin-footer .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
        }

        .admin-footer .version {
            color: #d6cbc0;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 640px) {
            .admin-container {
                padding: 24px 20px;
                border-radius: 24px;
            }
            .admin-header h1 {
                font-size: 24px;
            }
            .menu-grid {
                grid-template-columns: 1fr 1fr;
                gap: 14px;
            }
            .menu-item {
                padding: 18px 12px;
                min-height: 100px;
            }
            .menu-icon {
                width: 48px;
                height: 48px;
                font-size: 24px;
            }
        }

        @media (max-width: 400px) {
            .menu-grid {
                grid-template-columns: 1fr;
            }
            .admin-container {
                padding: 20px 16px;
            }
        }
    </style>
</head>
<body>
<!-- 鼠标跟随光晕 -->
<div class="glow" id="glow"></div>

<div class="admin-container">
    <!-- 头部 -->
    <div class="admin-header">
        <span class="shield-icon">🛡️</span>
        <h1>管理员控制台</h1>
        <p class="subtitle">翱三通史 · 后台管理</p>
    </div>

    <!-- 功能菜单 -->
    <div class="menu-grid">
        <a href="./get-log" class="menu-item">
            <span class="menu-icon">📋</span>
            <span class="menu-label">
                    查看日志
                    <small>系统运行记录</small>
                </span>
        </a>
        <a href="./maintenance" class="menu-item">
            <span class="menu-icon">⚙️</span>
            <span class="menu-label">
                    管理服务器
                    <small>维护模式控制</small>
                </span>
        </a>
        <a href="./check-issues" class="menu-item">
            <span class="menu-icon">🔍</span>
            <span class="menu-label">
                    查看错误
                    <small>异常汇总处理</small>
                </span>
        </a>
    </div>

    <!-- 底部 -->
    <div class="admin-footer">
        <span class="status-dot"></span>
        系统运行中 ·
        <span class="version">v3.0</span>
        <br>
        <span style="font-size: 11px; opacity: 0.5;">
                翱三通史 · 内部管理工具
            </span>
    </div>
</div>

<script>
    // ===== 鼠标跟随光晕效果 =====
    const glow = document.getElementById('glow');

    document.addEventListener('mousemove', (e) => {
        glow.style.left = e.clientX + 'px';
        glow.style.top = e.clientY + 'px';
    });

    // ===== 卡片点击涟漪效果 =====
    document.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('click', function(e) {
            const ripple = document.createElement('span');
            const rect = this.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            const x = e.clientX - rect.left - size / 2;
            const y = e.clientY - rect.top - size / 2;

            ripple.style.cssText = `
                    position: absolute;
                    width: ${size}px;
                    height: ${size}px;
                    left: ${x}px;
                    top: ${y}px;
                    background: rgba(255, 255, 255, 0.15);
                    border-radius: 50%;
                    transform: scale(0);
                    animation: rippleEffect 0.6s ease-out forwards;
                    pointer-events: none;
                `;

            this.appendChild(ripple);

            setTimeout(() => {
                ripple.remove();
            }, 700);
        });
    });

    // 添加 ripple 动画（动态注入）
    const styleSheet = document.createElement('style');
    styleSheet.textContent = `
            @keyframes rippleEffect {
                to {
                    transform: scale(4);
                    opacity: 0;
                }
            }
        `;
    document.head.appendChild(styleSheet);
</script>
</body>
</html>
